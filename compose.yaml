services:
    booking-api:
        build:
            context: .
            dockerfile: ./docker/php/Dockerfile
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        environment:
            LARAVEL_SAIL: 0
        volumes:
            - '.:/var/www/html'
        working_dir: /var/www/html
        # Komenda startowa nie musi już instalować Composera - obraz ma go już w sobie!
        networks:
            - sail
        depends_on:
            pgsql:
                condition: service_healthy

    nginx:
        image: 'nginx:alpine'
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
            - '.:/var/www/html'
            - './docker/php/nginx.conf:/etc/nginx/conf.d/default.conf'
        networks:
            - sail
        depends_on:
            - booking-api

    pgsql:
        image: 'postgres:15-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE:-laravel}'
            POSTGRES_USER: '${DB_USERNAME:-sail}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql/data'
        networks:
            - sail
        # Uproszczony i stabilny healthcheck za pomocą wbudowanego użytkownika postgres
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5

    pgadmin:
        image: dpage/pgadmin4:latest
        environment:
            PGADMIN_DEFAULT_EMAIL: '${PGADMIN_EMAIL:-admin@admin.com}'
            PGADMIN_DEFAULT_PASSWORD: '${PGADMIN_PASSWORD:-admin}'
        ports:
            - '${PGADMIN_PORT:-5050}:80'
        volumes:
            - 'sail-pgadmin:/var/lib/pgadmin'
        networks:
            - sail
        depends_on:
            - pgsql

networks:
    sail:
        driver: bridge

volumes:
    sail-pgsql:
        driver: local
    sail-pgadmin:
        driver: local
